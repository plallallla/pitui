# Pitui global configuration example.
# Copy this file to the platform config directory or pass --config <path>.
schema_version = 1

[ui.footer]
mode = "contextual" # contextual | compact | hidden
max_rows = 1 # 1..3
show_global = true
show_alternative_bindings = false
default_visibility = "registry" # registry | all | allowlist
separator = " | "
overflow = "count" # count | ellipsis

[ui.footer.groups."commit.copy"]
visible = true
label = "copy…"
priority = 110

[ui.footer.groups."file.copy"]
visible = true
label = "copy file…"
priority = 110

[ui.footer.commands."app.shortcuts"]
visible = true
label = "help"
priority = 100

[ui.footer.commands."app.command_prompt"]
visible = true
label = "command"
priority = 100

[ui.footer.commands."app.operation_palette"]
visible = true
label = "operations"
priority = 100

[ui.footer.commands."app.refresh"]
visible = true
label = "refresh"
priority = 100

[ui.footer.commands."commit.copy.hash"]
visible = true
label = "hash"

[ui.footer.commands."commit.copy.info"]
visible = true
label = "info"

[ui.footer.commands."commit.copy.message"]
visible = true
label = "message"

[keybindings]
chord_timeout_ms = 0 # 0 waits until completion, Esc, or an unmatched key

[keybindings.commands."app.refresh"]
bindings = ["Ctrl+R"]

[keybindings.commands."app.shortcuts"]
bindings = ["h"]

[keybindings.commands."app.command_prompt"]
bindings = ["Ctrl+`"]

[keybindings.commands."app.operation_palette"]
bindings = ["Ctrl+P"]

[keybindings.commands."navigation.up"]
bindings = ["w", "Up", "k"]

[keybindings.commands."navigation.left"]
bindings = ["a", "Left"]

[keybindings.commands."navigation.down"]
bindings = ["s", "Down", "j"]

[keybindings.commands."navigation.right"]
bindings = ["d", "Right", "l"]

# WASD owns normal-mode navigation. Conflicting operations use uppercase keys.
[keybindings.commands."branch.switch"]
bindings = ["S"]

[keybindings.commands."changes.stage"]
bindings = ["S"]

[keybindings.commands."diff.wrap.toggle"]
bindings = ["W"]

[keybindings.commands."remote.add"]
bindings = ["A"]

[keybindings.commands."view.changes.toggle"]
bindings = ["Ctrl+G"]

[keybindings.commands."commit.copy.hash"]
bindings = ["Ctrl+C h"]

[keybindings.commands."commit.copy.info"]
bindings = ["Ctrl+C i"]

[keybindings.commands."commit.copy.message"]
bindings = ["Ctrl+C m"]

# These share the Ctrl+C prefix but are mounted only while a file-list column
# has focus. They never appear or execute in Commits or Diff focus tables.
[keybindings.commands."file.copy.name"]
bindings = ["Ctrl+C n"]

[keybindings.commands."file.copy.absolute_path"]
bindings = ["Ctrl+C a"]

[keybindings.commands."file.copy.relative_path"]
bindings = ["Ctrl+C r"]

[diff]
default_mode = "unified" # unified | side-by-side

# Per-view layout/detail settings. Known ids: history, commit, file-diff,
# changes, reflog, remotes. Width must be 20..80.
[views.history]
left_width_percent = 36
commit_density = "detailed" # compact | detailed
show_commit_author = true
show_commit_datetime = true
show_commit_tags = true

[views.commit]
left_width_percent = 36
commit_density = "compact"

# A view-scoped binding replaces the global binding only in this view.
[views.history.operations."app.refresh"]
bindings = ["Ctrl+R"]

[logging]
enabled = true
level = "info" # error | warn | info | debug | trace
# path = "logs/pitui.jsonl" # relative to this config file
format = "jsonl"
flush_interval_ms = 0 # 0 flushes each event; otherwise 50..=60000
buffer_capacity = 1024 # BufWriter byte capacity, 16..=1000000
max_detail_chars = 4096 # 256..=65536
fail_on_open_error = false

[logging.rotation]
enabled = true
max_size = "5 MiB" # B | KiB | MiB | GiB
keep_files = 1 # 0..=100
rotate_on_start = false

[logging.targets]
git_worker = "info"
