name: Feature request
description: Suggest a focused Git TUI workflow improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Git workflow is difficult today, and who encounters it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the UI, key bindings, Git commands, and expected state transitions.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and failure handling
      description: Explain confirmation requirements, destructive effects, conflicts, rollback, and multi-repository isolation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
